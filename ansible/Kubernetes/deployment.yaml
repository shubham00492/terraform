apiVersion: apps/v1
kind: Deployment 
metadata:
  name: myapp3   
spec:
  strategy: 
    type: Recreate
  replicas: 5
  selector:
    matchLabels:
      app: myapp3
  template:
    metadata:
      labels:
        app: myapp3
    spec:
      containers:
        - name: nginx
          image: shubhamjain77/shubham:httpd-vi
          resources:
            limits:
              memory: "128Mi"
              cpu: "500m"
          ports:
            - containerPort: 80