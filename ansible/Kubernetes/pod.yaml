apiVersion: v1
kind: Pod
metadata:
  name: my-app
  labels:
    app: my-app   
spec:
  containers:
    - name: my-app  
      image: shubhamjain77/shubham:httpd-vi
      resources:
        limits:
          memory: "128Mi"
          cpu: "500m"
      ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: my-app
spec:
    selector:
      app: my-app
    ports:
      - protocol: TCP
        port: 80
        targetPort: 80
    