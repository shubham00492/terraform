apiVersion: v1
kind: Pod
metadata:
  name: my-app
  namespace: dataspace
  labels:
    app: my-app   
spec:
  containers:
    - name: my-app  
      image: shubhamjain77/shubham:httpd-vi
      resources:
        limits:
          memory: "128Mi"
          cpu: "500m"
      ports:
        - containerPort: 80
---
apiVersion: v1
kind: Namespace
metadata:
  name: dataspace






